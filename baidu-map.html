<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
    }
  </style>

  <script src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_BAIDU_MAP_AK"></script>
</head>

<body>
  <div id="map"></div>

  <script>
    const map = new BMap.Map("map");
    const search = new BMap.LocalSearch(map, {
      renderOptions: {
        map: map,
        autoViewport: true
      }
    });

    search.search("香港科技大学（广州）");
    map.enableScrollWheelZoom(true);
  </script>
</body>
</html>
