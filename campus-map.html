<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>香港科技大学（广州）地图</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQ3ynh0dBLJ9qS5p4p3qzF2qA2GZKQo="
      crossorigin=""
    >
    <style>
      html, body, #map {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .leaflet-popup-content {
        margin: 14px 18px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .leaflet-popup-content strong {
        color: #173f7a;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div id="map" aria-label="香港科技大学（广州）地图"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const campus = [22.8942, 113.47828];
      const map = L.map("map", { scrollWheelZoom: false }).setView(campus, 15);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
          maxZoom: 20,
          subdomains: "abcd"
        }
      ).addTo(map);

      L.marker(campus)
        .addTo(map)
        .bindPopup(
          "<strong>香港科技大学（广州）</strong><br>No. 1 Duxue Road, Nansha District, Guangzhou"
        )
        .openPopup();
    </script>
  </body>
</html>
